<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Doll</title>

  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:ital,wght@1,700&family=Libertinus+Serif:wght@400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; }

    .page { display: flex; min-height: 100vh; }

    .viewer-panel {
      flex: 0 0 56%;
      position: sticky;
      top: 0;
      height: 100vh;
      background: #f4f3ef;
      border-radius: 0 20px 20px 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #three-canvas { width: 100%; height: 100%; display: block; }

    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #f4f3ef;
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    .loader.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 28px; height: 28px;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-top-color: rgba(0,0,0,0.45);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(0,0,0,0.35); }

    .info-panel { flex: 1; padding: 52px 48px 52px 44px; overflow-y: auto; max-height: 100vh; }

    .product-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
    .product-name { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 700; font-style: italic; line-height: 1.15; color: #111; }
    .product-price { font-family: 'Libertinus Serif', serif; font-size: 24px; font-weight: 400; color: #111; white-space: nowrap; padding-top: 6px; letter-spacing: 0.01em; }

    .divider { height: 1px; background: #e6e6e4; margin: 22px 0; }

    .section-group { margin-bottom: 24px; }
    .section-eyebrow { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #999; margin-bottom: 16px; }
    .sub-section { margin-bottom: 16px; }
    .sub-section:last-child { margin-bottom: 0; }
    .sub-label { font-size: 12px; font-weight: 500; color: #333; margin-bottom: 9px; display: flex; align-items: center; gap: 8px; }
    .color-dot { width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.12); flex-shrink: 0; transition: background 0.2s; }

    .dual-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

    .swatches { display: flex; flex-wrap: wrap; gap: 7px; }
    .swatch {
      width: 25px; height: 25px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform 0.15s ease, border-color 0.15s ease;
      position: relative; flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.12); }
    .swatch.selected { transform: scale(1.12); border-color: #111 !important; }
    .swatch.selected::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.25); }
    .swatch.light-color { border-color: #ddd; }

    .qty-wrapper { margin-bottom: 20px; }
    .qty-label { font-size: 12px; font-weight: 500; color: #333; margin-bottom: 10px; }
    .qty-control { display: inline-flex; align-items: center; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
    .qty-btn { width: 42px; height: 42px; background: transparent; border: none; cursor: pointer; font-size: 17px; color: #111; display: flex; align-items: center; justify-content: center; transition: background 0.12s; user-select: none; }
    .qty-btn:hover { background: #f5f5f5; }
    .qty-btn:disabled { color: #ccc; cursor: default; }
    .qty-value { width: 46px; text-align: center; font-size: 14px; color: #111; border-left: 1px solid #ddd; border-right: 1px solid #ddd; line-height: 42px; user-select: none; }

    .btn-cart { width: 100%; padding: 15px 20px; background: #111; color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; transition: opacity 0.15s; text-transform: uppercase; }
    .btn-cart:hover { opacity: 0.82; }

    /* ── Doll dialog ── */
    #doll-dialog {
      display: none;
      margin-bottom: 16px;
    }
    #doll-dialog.show {
      display: block;
      animation: popIn 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(-6px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }
    #dialog-bubble {
      background: #fff;
      border: 1.5px solid #111;
      border-radius: 18px 18px 18px 4px;
      padding: 13px 40px 13px 16px;
      font-size: 13px;
      line-height: 1.55;
      color: #111;
      width: 260px;
      box-shadow: 3px 3px 0 #111;
      position: relative;
    }
    #dialog-close {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; font-size: 11px;
      color: #aaa; cursor: pointer; padding: 2px; line-height: 1;
    }
    #dialog-close:hover { color: #111; }

    @media (max-width: 780px) {
      .page { flex-direction: column; }
      .viewer-panel { flex: none; height: 52vw; min-height: 280px; position: relative; border-radius: 0 0 20px 20px; }
      .info-panel { padding: 32px 24px 48px; max-height: none; overflow-y: visible; }
      .product-name { font-size: 26px; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="viewer-panel" id="viewer-panel">
    <div class="loader" id="loader">
      <div class="loader-ring"></div>
      <span class="loader-text" id="loader-text">Loading model</span>
    </div>
    <canvas id="three-canvas"></canvas>

  </div>

  <div class="info-panel">

    <div class="product-header">
      <h1 class="product-name">Custom Barbie Doll</em></h1>
      <span class="product-price">188.00 SGD</span>
    </div>

    <!-- 娃娃对话框 — 出现在右侧面板顶部 -->
    <div id="doll-dialog">
      <div id="dialog-bubble">
        <span id="dialog-text"></span>
        <button id="dialog-close">✕</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-group">
      <div class="section-eyebrow">Customize</div>
      <div class="sub-section">
        <div class="sub-label"><div class="color-dot" id="dot-hair"></div>Hair color</div>
        <div class="swatches" id="hair-swatches"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-group">
      <div class="section-eyebrow">Swimsuit</div>
      <div class="dual-row">
        <div class="sub-section">
          <div class="sub-label"><div class="color-dot" id="dot-sw-primary"></div>Primary</div>
          <div class="swatches" id="sw-primary-swatches"></div>
        </div>
        <div class="sub-section">
          <div class="sub-label"><div class="color-dot" id="dot-sw-secondary"></div>Secondary</div>
          <div class="swatches" id="sw-secondary-swatches"></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-group">
      <div class="section-eyebrow">Accessories</div>
      <div class="sub-section">
        <div class="sub-label"><div class="color-dot" id="dot-glasses"></div>Glasses frame</div>
        <div class="swatches" id="glasses-swatches"></div>
      </div>
      <div class="sub-section">
        <div class="sub-label"><div class="color-dot" id="dot-lens"></div>Lens tint</div>
        <div class="swatches" id="lens-swatches"></div>
      </div>
      <div class="sub-section">
        <div class="sub-label"><div class="color-dot" id="dot-heels"></div>Heels</div>
        <div class="swatches" id="heels-swatches"></div>
      </div>
      <div class="sub-section">
        <div class="sub-label"><div class="color-dot" id="dot-brass"></div>Brass details</div>
        <div class="swatches" id="brass-swatches"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="qty-wrapper">
      <div class="qty-label">Quantity</div>
      <div class="qty-control">
        <button class="qty-btn" id="qty-minus" disabled>−</button>
        <div class="qty-value" id="qty-display">1</div>
        <button class="qty-btn" id="qty-plus">+</button>
      </div>
    </div>

    <button class="btn-cart">Add to Cart</button>

  </div>
</div>


<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ═══════════════════════════════════════
   ⚙️  CONFIG
   ═══════════════════════════════════════ */

const MODEL_PATH = './doll.glb';

const PALETTES = {
  hair: [
    { name: 'Blonde',   hex: '#E8C060' },
    { name: 'Platinum', hex: '#E2D8C4' },
    { name: 'Auburn',   hex: '#7B3C1A' },
    { name: 'Black',    hex: '#1A1A1A' },
    { name: 'Pink',     hex: '#F472B6' },
    { name: 'Lavender', hex: '#A78BFA' },
    { name: 'Blue',     hex: '#60A5FA' },
    { name: 'Red',      hex: '#EF4444' },
  ],
  swimsuit: [
    { name: 'White',  hex: '#F5F5F3' },
    { name: 'Cream',  hex: '#F5E6C8' },
    { name: 'Blush',  hex: '#F9B8D0' },
    { name: 'Red',    hex: '#DC2626' },
    { name: 'Cobalt', hex: '#2563EB' },
    { name: 'Navy',   hex: '#1E3364' },
    { name: 'Sage',   hex: '#6EAA82' },
    { name: 'Lilac',  hex: '#8B5CF6' },
    { name: 'Black',  hex: '#1A1A1A' },
    { name: 'Gold',   hex: '#C8A227' },
  ],
  glasses: [
    { name: 'Black',    hex: '#1A1A1A' },
    { name: 'Tortoise', hex: '#7B4A25' },
    { name: 'Pink',     hex: '#F472B6' },
    { name: 'Gold',     hex: '#C8A227' },
    { name: 'Silver',   hex: '#A8A8AC' },
    { name: 'White',    hex: '#F0EFEB' },
  ],
  lens: [
    { name: 'Clear',  hex: '#D8EDFA' },
    { name: 'Blush',  hex: '#FECDD3' },
    { name: 'Sky',    hex: '#BAD9FC' },
    { name: 'Smoke',  hex: '#6B7280' },
    { name: 'Black',  hex: '#1A1A1A' },
    { name: 'Mirror', hex: '#C0C4CC' },
  ],
  heels: [
    { name: 'Black', hex: '#1A1A1A' },
    { name: 'White', hex: '#F0EFEB' },
    { name: 'Nude',  hex: '#D4A070' },
    { name: 'Red',   hex: '#DC2626' },
    { name: 'Pink',  hex: '#F472B6' },
    { name: 'Gold',  hex: '#C8A227' },
  ],
  brass: [
    { name: 'Gold',      hex: '#C8A227' },
    { name: 'Rose Gold', hex: '#C07878' },
    { name: 'Silver',    hex: '#A8A8AC' },
    { name: 'Bronze',    hex: '#8C6030' },
    { name: 'Black',     hex: '#1A1A1A' },
    { name: 'White',     hex: '#F0EFEB' },
  ],
};

const DEFAULTS = {
  hair: 0, swimPrimary: 0, swimSecondary: 8,
  glasses: 0, lens: 0, heels: 0, brass: 0,
};


/* ═══════════════════════════════════════
   🎄  丑色判断 + 对话框
   ═══════════════════════════════════════ */

const currentSwimColors = {
  primary:   PALETTES.swimsuit[DEFAULTS.swimPrimary].hex,
  secondary: PALETTES.swimsuit[DEFAULTS.swimSecondary].hex,
};

function isReddish(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return r > 160 && g < 100 && b < 100;
}

function isGreenish(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return g > 100 && r < 160 && b < 150;
}

// 预加载两张脸部贴图
const texLoader = new THREE.TextureLoader();
const faceTextures = {
  normal:    texLoader.load('./face_normal.png'),
  disgusted: texLoader.load('./face_disgusted.png'),
};
// GLB 里的贴图 flipY=false，TextureLoader 默认 flipY=true，必须统一
faceTextures.normal.flipY    = false;
faceTextures.disgusted.flipY = false;
faceTextures.normal.colorSpace    = THREE.SRGBColorSpace;
faceTextures.disgusted.colorSpace = THREE.SRGBColorSpace;

// 切换脸部贴图
function setFaceTexture(which) {
  (meshMap['Barbie_75_Head'] || []).forEach((mesh) => {
    mesh.material.map = faceTextures[which];
    mesh.material.needsUpdate = true;
  });
}

function checkUglyCombo() {
  const p = currentSwimColors.primary;
  const s = currentSwimColors.secondary;
  const isChristmas = (isReddish(p) && isGreenish(s)) || (isGreenish(p) && isReddish(s));
  if (isChristmas) {
    showDollDialog("I don't accept this color matching, not even Christmas. 🎄");
    setFaceTexture('disgusted');
  } else {
    setFaceTexture('normal');
  }
}

let dialogTimer = null;

function showDollDialog(text) {
  const dialog = document.getElementById('doll-dialog');
  document.getElementById('dialog-text').textContent = text;
  dialog.classList.remove('show');
  void dialog.offsetWidth;
  dialog.classList.add('show');
  clearTimeout(dialogTimer);
  dialogTimer = setTimeout(hideDollDialog, 5000);
}

function hideDollDialog() {
  document.getElementById('doll-dialog').classList.remove('show');
}

document.getElementById('dialog-close').addEventListener('click', hideDollDialog);


/* ═══════════════════════════════════════
   🎨  Three.js Setup
   ═══════════════════════════════════════ */

const canvas      = document.getElementById('three-canvas');
const viewerPanel = document.getElementById('viewer-panel');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(viewerPanel.clientWidth, viewerPanel.clientHeight);
renderer.outputColorSpace    = THREE.SRGBColorSpace;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, viewerPanel.clientWidth / viewerPanel.clientHeight, 0.01, 100);
camera.position.set(0, 0.2, 3.8);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const keyLight = new THREE.DirectionalLight(0xfff8f0, 2.2);
keyLight.position.set(2, 4, 3);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xe8f0ff, 0.9);
fillLight.position.set(-3, 1, 2);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffffff, 0.4);
rimLight.position.set(0, 3, -4);
scene.add(rimLight);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.06;
controls.enablePan       = false;
controls.minAzimuthAngle = -Math.PI * 0.5;
controls.maxAzimuthAngle =  Math.PI * 0.5;
controls.minPolarAngle   = Math.PI * 0.15;
controls.maxPolarAngle   = Math.PI * 0.72;
controls.minDistance     = 1.5;
controls.maxDistance     = 5.5;
controls.target.set(0, 0.2, 0);
controls.update();


/* ═══════════════════════════════════════
   💇  Swimsuit 双色 Shader
   ═══════════════════════════════════════ */

const swimUniforms = {
  uColor1: { value: new THREE.Color(PALETTES.swimsuit[DEFAULTS.swimPrimary].hex) },
  uColor2: { value: new THREE.Color(PALETTES.swimsuit[DEFAULTS.swimSecondary].hex) },
};

function applySwimsuitShader(material) {
  material.color.set('#ffffff');
  material.onBeforeCompile = (shader) => {
    shader.uniforms.uColor1 = swimUniforms.uColor1;
    shader.uniforms.uColor2 = swimUniforms.uColor2;
    shader.fragmentShader = 'uniform vec3 uColor1;\nuniform vec3 uColor2;\n' + shader.fragmentShader;
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <map_fragment>',
      `#ifdef USE_MAP
        vec4 texSample = texture2D(map, vMapUv);
        float luma = dot(texSample.rgb, vec3(0.299, 0.587, 0.114));
        diffuseColor.rgb = mix(uColor2, uColor1, luma);
        diffuseColor.a  *= texSample.a;
      #endif`
    );
  };
  material.needsUpdate = true;
}


/* ═══════════════════════════════════════
   📦  Load GLB
   ═══════════════════════════════════════ */

const meshMap = {};

new GLTFLoader().load(
  MODEL_PATH,

  (gltf) => {
    const model = gltf.scene;
    const box   = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    const scale  = 2.2 / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(scale);
    model.position.set(-center.x * scale, -center.y * scale + 0.05, -center.z * scale);

    model.traverse((child) => {
      if (!child.isMesh || !child.material?.name) return;
      const n = child.material.name;
      if (!meshMap[n]) meshMap[n] = [];
      meshMap[n].push(child);
    });

    // Hair — 移除贴图，交代码控色
    (meshMap['Hair.1001'] || []).forEach((mesh) => {
      mesh.material = mesh.material.clone();
      mesh.material.map = null;
      mesh.material.color.set(PALETTES.hair[DEFAULTS.hair].hex);
      mesh.material.needsUpdate = true;
    });

    // Swimsuit — 双色 shader
    if ((meshMap['Swimsuit'] || []).length > 0) {
      const mat = meshMap['Swimsuit'][0].material.clone();
      applySwimsuitShader(mat);
      meshMap['Swimsuit'].forEach((m) => { m.material = mat; });
    }

    scene.add(model);
    applyDefaultColors();

    const loaderEl = document.getElementById('loader');
    loaderEl.classList.add('hidden');
    setTimeout(() => loaderEl.remove(), 600);
  },

  (progress) => {
    if (progress.total > 0) {
      const el = document.getElementById('loader-text');
      if (el) el.textContent = `Loading model  ${Math.round(progress.loaded / progress.total * 100)}%`;
    }
  },

  (err) => {
    console.error(err);
    const el = document.getElementById('loader-text');
    if (el) el.textContent = "⚠ Failed — use Live Server, not file://";
  }
);


/* ═══════════════════════════════════════
   🖌  换色函数
   ═══════════════════════════════════════ */

function setColor(name, hex) {
  (meshMap[name] || []).forEach((m) => { m.material.color.set(hex); });
}

function setSwimsuitPrimary(hex) {
  swimUniforms.uColor1.value.set(hex);
  document.getElementById('dot-sw-primary').style.background = hex;
  currentSwimColors.primary = hex;
  checkUglyCombo();
}

function setSwimsuitSecondary(hex) {
  swimUniforms.uColor2.value.set(hex);
  document.getElementById('dot-sw-secondary').style.background = hex;
  currentSwimColors.secondary = hex;
  checkUglyCombo();
}

function applyDefaultColors() {
  setColor('Hair.1001', PALETTES.hair[DEFAULTS.hair].hex);
  setColor('Glasses',   PALETTES.glasses[DEFAULTS.glasses].hex);
  setColor('Lens',      PALETTES.lens[DEFAULTS.lens].hex);
  setColor('Heels',     PALETTES.heels[DEFAULTS.heels].hex);
  setColor('Brass',     PALETTES.brass[DEFAULTS.brass].hex);
  setSwimsuitPrimary(PALETTES.swimsuit[DEFAULTS.swimPrimary].hex);
  setSwimsuitSecondary(PALETTES.swimsuit[DEFAULTS.swimSecondary].hex);
}


/* ═══════════════════════════════════════
   🎛  Swatches UI
   ═══════════════════════════════════════ */

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*.299 + g*.587 + b*.114) > 195;
}

function buildSwatches(id, palette, onChange, defaultIdx, dotId) {
  const container = document.getElementById(id);
  if (!container) return;
  palette.forEach((color, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i === defaultIdx ? ' selected' : '');
    s.style.background = color.hex;
    s.title = color.name;
    if (isLight(color.hex)) s.classList.add('light-color');
    s.addEventListener('click', () => {
      container.querySelectorAll('.swatch').forEach(x => x.classList.remove('selected'));
      s.classList.add('selected');
      if (dotId) { const d = document.getElementById(dotId); if (d) d.style.background = color.hex; }
      onChange(color.hex);
    });
    container.appendChild(s);
  });
  if (dotId && palette[defaultIdx]) {
    const d = document.getElementById(dotId);
    if (d) d.style.background = palette[defaultIdx].hex;
  }
}

buildSwatches('hair-swatches',         PALETTES.hair,     (h) => setColor('Hair.1001', h), DEFAULTS.hair,          'dot-hair');
buildSwatches('sw-primary-swatches',   PALETTES.swimsuit, (h) => setSwimsuitPrimary(h),    DEFAULTS.swimPrimary,   'dot-sw-primary');
buildSwatches('sw-secondary-swatches', PALETTES.swimsuit, (h) => setSwimsuitSecondary(h),  DEFAULTS.swimSecondary, 'dot-sw-secondary');
buildSwatches('glasses-swatches',      PALETTES.glasses,  (h) => setColor('Glasses', h),   DEFAULTS.glasses,       'dot-glasses');
buildSwatches('lens-swatches',         PALETTES.lens,     (h) => setColor('Lens', h),      DEFAULTS.lens,          'dot-lens');
buildSwatches('heels-swatches',        PALETTES.heels,    (h) => setColor('Heels', h),     DEFAULTS.heels,         'dot-heels');
buildSwatches('brass-swatches',        PALETTES.brass,    (h) => setColor('Brass', h),     DEFAULTS.brass,         'dot-brass');


/* ═══════════════════════════════════════
   🔢  Quantity
   ═══════════════════════════════════════ */

let qty = 1;
const qtyDisplay = document.getElementById('qty-display');
const qtyMinus   = document.getElementById('qty-minus');
const qtyPlus    = document.getElementById('qty-plus');

qtyMinus.addEventListener('click', () => {
  if (qty > 1) { qty--; qtyDisplay.textContent = qty; }
  qtyMinus.disabled = qty <= 1;
});
qtyPlus.addEventListener('click', () => {
  qty++; qtyDisplay.textContent = qty; qtyMinus.disabled = false;
});


/* ═══════════════════════════════════════
   🔄  Render loop + resize
   ═══════════════════════════════════════ */

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  const w = viewerPanel.clientWidth, h = viewerPanel.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

</script>
</body>
</html>
